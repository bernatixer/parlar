services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: parlar
      POSTGRES_PASSWORD: parlar
      POSTGRES_DB: parlar
    ports:
      - "15432:5432"
    volumes:
      - parlar-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U parlar -d parlar"]
      interval: 2s
      timeout: 2s
      retries: 20

volumes:
  parlar-pg:
